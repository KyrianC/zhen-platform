upstream zhen-api {
    server api:8000;
}

upstream zhen-web-client {
    server web-client:3000;
}

server {

    server_name zhen.network;

    listen 80;

    location / {
        proxy_pass http://zhen-web-client;
        add_header Access-Control-Allow-Origin *;
    }
}

server {

    listen 80;

    server_name api.zhen.network;

    location / {
        proxy_pass http://zhen-api;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /home/django/zhen-api/staticfiles/;
        add_header Access-Control-Allow-Origin *;
    }
}
