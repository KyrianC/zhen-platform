services:
  api:
    build:
      context: ./zhen-core/
      dockerfile: ./Dockerfile.prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - backend_static_volume:/home/django/zhen-api/staticfiles
    expose:
      - 8000
    depends_on:
      - db
    env_file:
      - ./.env.prod
  db:
    image: postgres:13.0-alpine
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.prod
  web-client:
    build:
      context: ./zhen-nuxt-frontend/
      dockerfile: ./Dockerfile.prod
    command: npm run start
    env_file:
      - ./.env.prod
    expose:
      - 3000
  nginx:
    build: ./nginx
    volumes:
      - backend_static_volume:/home/django/zhen-api/staticfiles
      - /etc/letsencrypt:/etc/letsencrypt
      - ./certbot/www:var/www/certbot/
    ports:
      - 80:80
      - 443:443
    depends_on:
      - api
      - web-client
  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./certbot/www:var/www/certbot/

volumes:
  postgres_data:
  backend_static_volume:
