services:
  api:
    build:
      context: ./zhen-core/
      dockerfile: ./Dockerfile.prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db
    ports:
      - 8000:8000
    env_file:
      - ./.env.prod
  db:
    image: postgres:13.0-alpine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.prod
  web-client:
    build:
      context: ./zhen-nuxt-frontend/
      dockerfile: ./Dockerfile.prod
    command: npm run start
    ports:
      - 3000:3000
    env_file: ./.env.prod

volumes:
  postgres_data:
