services:
  api:
    build:
      context: ./zhen-core/
      dockerfile: ./Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./zhen-core/:/zhen-api/
    ports:
      - 8000:8000
    env_file:
      - ./.env
  db:
    image: postgres:13.0-alpine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
  web-client:
    build:
      context: ./zhen-nuxt-frontend/
      dockerfile: ./Dockerfile
    command: npm run dev
    volumes:
      - ./zhen-nuxt-frontend/:/zhen-web-client/
    ports:
      - 3000:3000
    env_file: ./.env

volumes:
  postgres_data:
